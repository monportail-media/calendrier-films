name: Update Calendar Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Create logos (first time only)
        run: |
          python scripts/download_logos.py

      - name: Run update script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update.py

      - name: Commit updated data and logos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add -f data.json assets/logos/
          git status
          git diff --staged --quiet || git commit -m "🔄 Mise à jour — $(date '+%Y-%m-%d')"
          git push
