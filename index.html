<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendrier">
<meta name="theme-color" content="#0d0f14" id="theme-color-meta">
<title>Calendrier Films & Séries</title>
<link rel="manifest" href="manifest.json">
<style>
/* ── THEMES ─────────────────────────────────────────────────────────────────── */
:root { --accent: #4f8ef7; }

[data-theme="dark"] {
  --bg: #0d0f14; --bg2: #131620; --bg3: #1a1d28; --bg4: #20243a;
  --border: #232840; --border2: #2e3452;
  --text: #e8edf5; --text2: #8892a8; --text3: #4a5270;
  --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  --shadow: rgba(0,0,0,.45);
}
[data-theme="light"] {
  --bg: #f0f3fa; --bg2: #ffffff; --bg3: #f5f7fd; --bg4: #eaedfa;
  --border: #e0e4f0; --border2: #c8cedf;
  --text: #0f1629; --text2: #4b5573; --text3: #9aa3bf;
  --green: #16a34a; --amber: #d97706; --red: #dc2626;
  --shadow: rgba(0,0,0,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; line-height: 1.6; min-height: 100vh; transition: background .2s, color .2s; }
a { color: inherit; text-decoration: none; }
button, input, select { font-family: inherit; font-size: 15px; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── LAYOUT ─────────────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-columns: 290px 1fr; min-height: 100vh; }
@media (max-width: 960px) { .app { grid-template-columns: 1fr; } }

/* ── SIDEBAR ─────────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
@media (max-width: 960px) {
  .sidebar { display: none; }
  .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 200; width: 88%; max-width: 320px; }
}
.sb-top { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg2); z-index: 5; }
.sb-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.sb-sub { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .6px; }

/* ── STATS ─────────────────────────────────────────────────────────────────── */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px 18px; border-bottom: 1px solid var(--border); }
.stat { background: var(--bg3); border-radius: 8px; padding: 9px 11px; }
.stat-v { font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1.1; }
.stat-l { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* ── THEME TOGGLE ─────────────────────────────────────────────────────────── */
.theme-row { display: flex; align-items: center; gap: 10px; padding: 9px 18px; border-bottom: 1px solid var(--border); }
.theme-lbl { font-size: 13px; color: var(--text2); flex: 1; }
.toggle-track { width: 42px; height: 24px; border-radius: 12px; background: var(--bg4); border: 1px solid var(--border); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.toggle-track.on { background: var(--accent); border-color: var(--accent); }
.toggle-thumb { position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
.toggle-track.on .toggle-thumb { left: 20px; }

/* ── FILTRES MINIMALISTES ─────────────────────────────────────────────────── */
.f-section { padding: 10px 18px; border-bottom: 1px solid var(--border); }
.f-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; font-weight: 600; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  display: inline-flex; align-items: center; padding: 4px 10px;
  border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  transition: all .12s; user-select: none;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* SEARCH */
.search-wrap { padding: 10px 18px; border-bottom: 1px solid var(--border); position: relative; }
.search-icon { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.search { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px 9px 34px; font-size: 14px; outline: none; transition: border-color .15s; }
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--text3); }

/* UPDATE */
.update-section { padding: 12px 18px; margin-top: auto; border-top: 1px solid var(--border); }
.update-info { font-size: 11px; color: var(--text3); line-height: 1.7; }
.update-date { color: var(--green); font-weight: 600; }
.reload-btn { display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; padding: 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 7px; transition: all .15s; }
.reload-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── MAIN ─────────────────────────────────────────────────────────────────── */
.main { min-width: 0; }
.main-hdr { display: flex; align-items: center; gap: 10px; padding: 18px 26px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 50; }
.main-title { font-size: 26px; font-weight: 700; letter-spacing: -.4px; flex: 1; }
.main-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
.view-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.vbtn { padding: 8px 16px; font-size: 13px; font-weight: 600; background: transparent; color: var(--text2); border: none; cursor: pointer; transition: all .15s; }
.vbtn.on { background: var(--accent); color: #fff; }
.menu-btn { display: none; background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
@media (max-width: 960px) { .menu-btn { display: block; } }

.content { padding: 20px 26px; }

/* ── RAPPELS ─────────────────────────────────────────────────────────────── */
.rem-bar { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
.rem-title { font-size: 10px; color: var(--amber); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 7px; }
.rem-item { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.rem-item:last-child { border: none; }
.rem-date { color: var(--amber); font-size: 11px; }

/* ── LIST VIEW ────────────────────────────────────────────────────────────── */
.today-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 18px; }
.week-sep { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 0 9px; border-bottom: 1px solid var(--border); margin: 6px 0 14px; font-weight: 600; }
.day-block { margin-bottom: 18px; }
.day-lbl { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 9px; display: flex; align-items: center; gap: 7px; }
.dispo-dot { font-size: 10px; background: rgba(34,197,94,.12); color: var(--green); padding: 1px 7px; border-radius: 20px; font-weight: 700; }

/* ── EVENT CARD ───────────────────────────────────────────────────────────── */
.ecard {
  display: flex; gap: 14px; padding: 13px 15px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: all .13s; margin-bottom: 8px;
  align-items: flex-start;
}
.ecard:hover { border-color: var(--accent); background: var(--bg3); transform: translateY(-1px); box-shadow: 0 3px 10px var(--shadow); }
.ecard.ep-premiere { border-left: 3px solid var(--green); }
.ecard.ep-finale { border-left: 3px solid var(--red); }
.ecard.qc { border-left: 3px solid var(--accent); }
.eposter { width: 58px; height: 86px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--bg3); }
.eplaceholder { width: 58px; height: 86px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.ebody { flex: 1; min-width: 0; }
.etitle { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.emeta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
.plat-name { font-size: 12px; font-weight: 600; color: var(--accent); }
.country-chip { font-size: 10px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; }
.type-chip { font-size: 10px; color: var(--text3); }
.esaison { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.etags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.tag.qc { background: rgba(79,142,247,.12); color: var(--accent); border-color: rgba(79,142,247,.25); }
.tag.lgbt { background: rgba(168,85,247,.12); color: #a855f7; border-color: rgba(168,85,247,.25); }
.tag.note { background: rgba(245,158,11,.1); color: var(--amber); border-color: rgba(245,158,11,.2); }
.tag.avenir { background: rgba(245,158,11,.08); color: var(--amber); border-color: rgba(245,158,11,.15); }
.tag.lang-fr { background: rgba(79,142,247,.08); color: var(--accent); border-color: rgba(79,142,247,.15); }
.tag.lang-en { background: rgba(34,197,94,.08); color: var(--green); border-color: rgba(34,197,94,.15); }
.tag.trailer { background: rgba(239,68,68,.08); color: var(--red); border-color: rgba(239,68,68,.15); }
.earrow { font-size: 22px; color: var(--text3); flex-shrink: 0; align-self: center; }

/* ── CALENDRIER ───────────────────────────────────────────────────────────── */
.cal-month { margin-bottom: 28px; }
.cal-mtitle { font-size: 17px; font-weight: 700; margin-bottom: 9px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
.cal-hd { background: var(--bg3); padding: 7px 3px; text-align: center; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }
.cal-cell { background: var(--bg2); padding: 5px; min-height: 84px; }
.cal-cell.today { border-top: 2px solid var(--accent); }
.cal-cell.empty { background: var(--bg); }
.cal-n { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 3px; }
.cal-cell.today .cal-n { color: var(--accent); }
.cal-dot { font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); transition: opacity .12s; line-height: 1.4; }
.cal-dot:hover { opacity: .7; border-color: var(--accent); }
.cal-dot.ep-premiere { border-left: 2px solid var(--green); }
.cal-dot.ep-finale { border-left: 2px solid var(--red); }
.cal-dot.qc { border-left: 2px solid var(--accent); }

/* ── LOADING / EMPTY ──────────────────────────────────────────────────────── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 14px; color: var(--text3); }
.empty-box { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 15px; }
.error-box { background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.2); border-radius: 9px; padding: 20px 24px; margin: 20px; font-size: 14px; line-height: 1.7; }

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 500; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
.modal-top { position: relative; }
.mback { width: 100%; height: 200px; object-fit: cover; border-radius: 14px 14px 0 0; display: block; }
.mback-ph { width: 100%; height: 80px; border-radius: 14px 14px 0 0; background: var(--bg3); }
.mclose { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.7); border: none; border-radius: 50%; width: 34px; height: 34px; color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mbadge { position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.mbody { padding: 16px 22px 24px; }
.mposter-row { display: flex; gap: 14px; align-items: flex-start; }
.mposter { width: 96px; border-radius: 9px; object-fit: cover; box-shadow: 0 4px 18px rgba(0,0,0,.35); border: 2px solid var(--border2); flex-shrink: 0; }
.mposter.up { margin-top: -54px; }
.minfo { flex: 1; min-width: 0; }
.mtags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
.mtitle { font-size: 24px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; }
.msaison { font-size: 14px; font-weight: 600; margin-bottom: 9px; color: var(--accent); }
.mmeta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
.mlangs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
.slbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; font-weight: 600; }
.mdesc { font-size: 14px; color: var(--text2); line-height: 1.75; margin-bottom: 18px; }
.cast-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
.cast-chip { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 3px 10px; border-radius: 20px; font-size: 12px; }
.trailers { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.tlink { display: flex; align-items: center; gap: 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); text-decoration: none; transition: border-color .13s; }
.tlink:hover { border-color: #e50914; }
.ytbadge { background: #e50914; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.tlabel { flex: 1; font-size: 13px; }
.tlang { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
.rem-toggle { width: 100%; padding: 11px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 9px; transition: all .13s; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); }
.rem-toggle.on { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); color: var(--green); }
.platlink { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; background: var(--accent); color: #fff; transition: opacity .13s; }
.platlink:hover { opacity: .88; }
.genres-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.genre-chip { background: var(--bg3); color: var(--text3); padding: 2px 8px; border-radius: 5px; font-size: 11px; border: 1px solid var(--border); }
.modal-sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.mob-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 199; }
.mob-backdrop.open { display: block; }
</style>
</head>
<body>
<div class="app">

<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-title">Films &amp; Séries</div>
    <div class="sb-sub">Québec &amp; International</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-v" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" id="s-avenir">—</div><div class="stat-l">À venir</div></div>
    <div class="stat"><div class="stat-v" id="s-qc">—</div><div class="stat-l">Québec</div></div>
    <div class="stat"><div class="stat-v" id="s-lgbt">—</div><div class="stat-l">LGBT+</div></div>
  </div>
  <div class="theme-row">
    <span class="theme-lbl">☀️ Mode clair / 🌙 Sombre</span>
    <div class="toggle-track" id="theme-btn" onclick="toggleTheme()"><div class="toggle-thumb"></div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" id="search" placeholder="Titre, acteur, pays, genre...">
  </div>
  <div class="f-section"><div class="f-label">Période</div><div class="chips" id="f-period"></div></div>
  <div class="f-section"><div class="f-label">Statut</div><div class="chips" id="f-status"></div></div>
  <div class="f-section"><div class="f-label">Type</div><div class="chips" id="f-type"></div></div>
  <div class="f-section"><div class="f-label">Langue</div><div class="chips" id="f-lang"></div></div>
  <div class="f-section"><div class="f-label">Pays d'origine</div><div class="chips" id="f-country"></div></div>
  <div class="f-section"><div class="f-label">Étiquettes</div><div class="chips" id="f-tags"></div></div>
  <div class="f-section"><div class="f-label">Catégorie</div><div class="chips" id="f-cats"></div></div>
  <div class="f-section"><div class="f-label">Plateforme</div><div class="chips" id="f-plat"></div></div>
  <div class="update-section">
    <div class="update-info">Mis à jour le <span class="update-date" id="update-date">—</span><br>Auto chaque lundi à 6h</div>
    <button class="reload-btn" onclick="reloadData()">↻ Recharger</button>
  </div>
</aside>
<div class="mob-backdrop" id="mob-backdrop" onclick="closeSidebar()"></div>

<main class="main">
  <div class="main-hdr">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div>
      <div class="main-title">Calendrier des sorties</div>
      <div class="main-sub" id="result-count">Chargement...</div>
    </div>
    <div class="view-toggle">
      <button class="vbtn on" id="btn-list" onclick="setView('list')">☰ Liste</button>
      <button class="vbtn" id="btn-cal" onclick="setView('cal')">📅 Cal.</button>
    </div>
  </div>
  <div class="content">
    <div id="rem-bar" style="display:none" class="rem-bar">
      <div class="rem-title">🔔 Rappels</div>
      <div id="rem-list"></div>
    </div>
    <div id="content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement...</div></div></div>
  </div>
</main>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal"><div id="modal-top"></div><div class="mbody" id="modal-body"></div></div>
</div>

<script>
// ── THEME ─────────────────────────────────────────────────────────────────────
let isDark = localStorage.getItem('theme') !== 'light';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark?'dark':'light');
  document.getElementById('theme-color-meta').content = isDark?'#0d0f14':'#f0f3fa';
  document.getElementById('theme-btn').classList.toggle('on', isDark);
}
function toggleTheme() { isDark=!isDark; localStorage.setItem('theme',isDark?'dark':'light'); applyTheme(); }
applyTheme();

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const FR_D=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FR_M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const TODAY=new Date().toISOString().slice(0,10);
const THIS_MONTH=TODAY.slice(0,7);

const COUNTRY_FLAGS={'CA':'🇨🇦','QC':'🍁','USA':'🇺🇸','FR':'🇫🇷','UK':'🇬🇧','AU':'🇦🇺','JP':'🇯🇵','KR':'🇰🇷','EU':'🇪🇺','BR':'🇧🇷','MX':'🇲🇽','IN':'🇮🇳'};
const cf=c=>COUNTRY_FLAGS[c]||'🌍';
const fd=s=>{const d=new Date(s);return FR_D[d.getDay()]+' '+d.getDate()+' '+FR_M[d.getMonth()];};
const fmth=s=>{const[y,m]=s.split('-').map(Number);return FR_M[m-1]+' '+y;};

// ── ETAT ──────────────────────────────────────────────────────────────────────
let ALL=[];
let state={
  search:'',period:'all',status:'all',
  types:new Set(['serie']),
  tags:new Set(),cats:new Set(),plat:'all',lang:'all',
  country:'all',view:'list'
};
let reminders=JSON.parse(localStorage.getItem('cal_rem')||'[]');
let curModal=null;

// ── CHARGEMENT ────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const json=await r.json();
    ALL=(json.events||[]).sort((a,b)=>a.date.localeCompare(b.date));
    if(json.generated_at){
      const d=new Date(json.generated_at);
      document.getElementById('update-date').textContent=d.getDate()+' '+FR_M[d.getMonth()]+' '+d.getFullYear();
    }
    initFilters(); render();
    setTimeout(scrollToToday,400);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="error-box"><strong>Impossible de charger les données.</strong><br>Hébergez sur GitHub Pages pour que cela fonctionne.</div>';
  }
}
async function reloadData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Rechargement...</div></div>';
  await loadData();
}
function scrollToToday(){
  const el=document.getElementById('today-anchor');
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── FILTRES ───────────────────────────────────────────────────────────────────
function filtered(){
  const q=state.search.toLowerCase();
  return ALL.filter(e=>{
    if(q&&![e.title,e.desc,...(e.cast||[]),...(e.categories||[]),e.country||'',e.platform||''].join(' ').toLowerCase().includes(q))return false;
    if(state.plat!=='all'&&e.platform!==state.plat)return false;
    if(!state.types.has(e.type))return false;
    if(state.cats.size>0&&!(e.categories||[]).some(c=>state.cats.has(c)))return false;
    if(state.tags.size>0&&!(e.tags||[]).some(t=>state.tags.has(t)))return false;
    if(state.status!=='all'&&e.status!==state.status)return false;
    if(state.lang==='fr'&&!(e.lang||[]).includes('FR'))return false;
    if(state.lang==='en'&&!(e.lang||[]).includes('EN'))return false;
    if(state.period==='2025'&&!e.date.startsWith('2025'))return false;
    if(state.period==='2026'&&!e.date.startsWith('2026'))return false;
    if(state.country!=='all'&&e.country!==state.country)return false;
    return true;
  });
}

function initFilters(){
  const allCats=[...new Set(ALL.flatMap(e=>e.categories||[]))].sort();
  const allPlats=[...new Set(ALL.map(e=>e.platform).filter(Boolean))].sort();
  const allCountries=[...new Set(ALL.map(e=>e.country).filter(Boolean))].sort();

  function mk(id,items,stateKey,isSet){
    const el=document.getElementById(id);el.innerHTML='';
    items.forEach(([val,lbl])=>{
      const sp=document.createElement('span');
      sp.className='chip';sp.dataset.val=val;sp.textContent=lbl;
      const isOn=isSet?state[stateKey].has(val):state[stateKey]===val;
      if(isOn) sp.classList.add('on');
      sp.onclick=()=>{
        if(isSet){
          const s=state[stateKey];
          if(s.has(val)){if(stateKey==='types'&&s.size===1)return;s.delete(val);sp.classList.remove('on');}
          else{s.add(val);sp.classList.add('on');}
        }else{
          el.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
          state[stateKey]=val;sp.classList.add('on');
        }
        render();
      };
      el.appendChild(sp);
    });
  }

  mk('f-period',[['all','Tout'],['2025','2025'],['2026','2026']],'period',false);
  mk('f-status',[['all','Tout'],['sorti','Disponible'],['a-venir','À venir']],'status',false);
  mk('f-lang',[['all','Tout'],['fr','🇫🇷 FR'],['en','🇬🇧 EN']],'lang',false);
  mk('f-type',[['serie','📺 Séries'],['film','🎬 Films']],'types',true);
  mk('f-tags',[['QC','🍁 Québec'],['CA','🇨🇦 Canada'],['LGBT','🏳️‍🌈 LGBT+'],['USA','🇺🇸 USA'],['FR','🇫🇷 France']],'tags',true);
  mk('f-cats',allCats.map(c=>[c,c]),'cats',true);
  mk('f-plat',[['all','Toutes'],...allPlats.map(p=>[p,p])],'plat',false);
  mk('f-country',[['all','Tous'],...allCountries.map(c=>[c,cf(c)+' '+c])],'country',false);

  // Activer "Tout" et "Séries" par défaut
  document.querySelectorAll('#f-period .chip[data-val="all"],#f-status .chip[data-val="all"],#f-lang .chip[data-val="all"],#f-plat .chip[data-val="all"],#f-country .chip[data-val="all"]').forEach(c=>c.classList.add('on'));
  document.querySelector('#f-type .chip[data-val="serie"]')?.classList.add('on');

  document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const evs=filtered();
  document.getElementById('s-total').textContent=ALL.length;
  document.getElementById('s-avenir').textContent=ALL.filter(e=>e.status==='a-venir').length;
  document.getElementById('s-qc').textContent=ALL.filter(e=>(e.tags||[]).includes('QC')).length;
  document.getElementById('s-lgbt').textContent=ALL.filter(e=>(e.tags||[]).includes('LGBT')).length;
  document.getElementById('result-count').textContent=evs.length+' titre'+(evs.length!==1?'s':'')+' — '+evs.filter(e=>e.status==='a-venir').length+' à venir';
  renderReminders();
  document.getElementById('content').innerHTML=state.view==='list'?renderList(evs):renderCal(evs);
}

// ── LIST ──────────────────────────────────────────────────────────────────────
function renderList(evs){
  if(!evs.length)return'<div class="empty-box">Aucun résultat pour ces filtres.</div>';
  const groups={};
  evs.forEach(e=>{
    const d=new Date(e.date);const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
    const wk=sun.toISOString().slice(0,10);
    if(!groups[wk])groups[wk]={};
    if(!groups[wk][e.date])groups[wk][e.date]=[];
    groups[wk][e.date].push(e);
  });
  let html='<button class="today-btn" onclick="scrollToToday()">📅 Mois courant</button>';
  let foundToday=false;
  Object.keys(groups).sort().forEach(wk=>{
    const wd=new Date(wk);const ed=new Date(wk);ed.setDate(wd.getDate()+6);
    const wkM=wk.slice(0,7);const edM=ed.toISOString().slice(0,7);
    if(!foundToday&&(wkM===THIS_MONTH||edM===THIS_MONTH)){html+=`<div id="today-anchor"></div>`;foundToday=true;}
    html+=`<div class="week-sep">${wd.getDate()} ${FR_M[wd.getMonth()]} — ${ed.getDate()} ${FR_M[ed.getMonth()]} ${ed.getFullYear()}</div>`;
    Object.keys(groups[wk]).sort().forEach(day=>{
      const d=new Date(day);const isPast=day<=TODAY;
      html+=`<div class="day-block"><div class="day-lbl">${FR_D[d.getDay()]} ${d.getDate()} ${FR_M[d.getMonth()]}${isPast?'<span class="dispo-dot">DISPO</span>':''}</div>`;
      groups[wk][day].forEach(e=>html+=cardHTML(e));
      html+='</div>';
    });
  });
  return html;
}

function cardHTML(e){
  const isQC=(e.tags||[]).includes('QC');
  const epCls=e.ep_status==='premiere'?' ep-premiere':e.ep_status==='finale'?' ep-finale':isQC?' qc':'';
  const saison_color=e.ep_status==='premiere'?'var(--green)':e.ep_status==='finale'?'var(--red)':'var(--accent)';
  const country=e.country||'';

  return`<div class="ecard${epCls}" onclick="openModal('${e.id}')">
    ${e.poster?`<img class="eposter" src="${e.poster}" alt="" onerror="this.style.display='none'">`:
    `<div class="eplaceholder">${e.type==='film'?'🎬':'📺'}</div>`}
    <div class="ebody">
      <div class="etitle">${e.title}</div>
      <div class="emeta-row">
        <span class="plat-name">${e.platform||'—'}</span>
        ${country?`<span class="country-chip">${cf(country)} ${country}</span>`:''}
        <span class="type-chip">${e.type==='film'?'🎬':'📺'}</span>
      </div>
      <div class="esaison" style="color:${saison_color}">${e.saison||''}</div>
      <div class="etags">
        ${(e.tags||[]).includes('QC')?'<span class="tag qc">🍁 QC</span>':''}
        ${(e.tags||[]).includes('LGBT')?'<span class="tag lgbt">🏳️‍🌈 LGBT+</span>':''}
        ${e.note?`<span class="tag note">★ ${e.note}</span>`:''}
        ${e.status==='a-venir'?'<span class="tag avenir">À VENIR</span>':''}
        ${(e.lang||[]).map(l=>`<span class="tag ${l==='FR'?'lang-fr':'lang-en'}">${l==='FR'?'🇫🇷':'🇬🇧'} ${l}</span>`).join('')}
        ${(e.trailers||[]).length?`<span class="tag trailer">▶ ${e.trailers.length}</span>`:''}
      </div>
    </div>
    <div class="earrow">›</div>
  </div>`;
}

// ── CAL ───────────────────────────────────────────────────────────────────────
function renderCal(evs){
  const months=[...new Set(evs.map(e=>e.date.slice(0,7)))].sort();
  if(!months.length)return'<div class="empty-box">Aucun résultat.</div>';
  let html='<button class="today-btn" onclick="scrollToToday()">📅 Mois courant</button>';
  let foundToday=false;
  months.forEach(ms=>{
    if(!foundToday&&ms===THIS_MONTH){html+=`<div id="today-anchor"></div>`;foundToday=true;}
    const[y,m]=ms.split('-').map(Number);
    const first=new Date(y,m-1,1).getDay();
    const days=new Date(y,m,0).getDate();
    html+=`<div class="cal-month"><div class="cal-mtitle">${fmth(ms)}</div><div class="cal-grid">
      ${FR_D.map(d=>`<div class="cal-hd">${d}</div>`).join('')}
      ${Array(first).fill('<div class="cal-cell empty"></div>').join('')}
      ${Array.from({length:days},(_,i)=>{
        const d=i+1;
        const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const de=evs.filter(e=>e.date===ds);
        return`<div class="cal-cell${ds===TODAY?' today':''}">
          <div class="cal-n">${d}</div>
          ${de.map(e=>{
            const isQC=(e.tags||[]).includes('QC');
            const epCls=e.ep_status==='premiere'?' ep-premiere':e.ep_status==='finale'?' ep-finale':isQC?' qc':'';
            return`<div class="cal-dot${epCls}" onclick="openModal('${e.id}')" title="${e.title} — ${e.saison} — ${e.platform}">${isQC?'🍁 ':''}${e.title}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div></div>`;
  });
  return html;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id){
  const e=ALL.find(x=>x.id===id);if(!e)return;
  curModal=e;
  const isOut=e.status==='sorti';const hasR=reminders.includes(id);
  const country=e.country||'';
  const epColor=e.ep_status==='premiere'?'var(--green)':e.ep_status==='finale'?'var(--red)':'var(--accent)';

  document.getElementById('modal-top').innerHTML=`
    ${e.backdrop?`<img class="mback" src="${e.backdrop}" alt="" onerror="this.style.display='none'">`:
    `<div class="mback-ph"></div>`}
    <button class="mclose" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    <div class="mbadge" style="background:${isOut?'#22c55e':'#f59e0b'};color:#000">${isOut?'DISPONIBLE':'À VENIR'}</div>`;

  const trailers=[...(e.trailers||[])].sort((a,b)=>a.lang==='VF'?-1:1);

  document.getElementById('modal-body').innerHTML=`
    <div class="mposter-row">
      ${e.poster?`<img class="mposter${e.backdrop?' up':''}" src="${e.poster}" alt="${e.title}" onerror="this.style.display='none'">` : ''}
      <div class="minfo">
        <div class="mtags-row">
          ${(e.tags||[]).includes('QC')?'<span class="tag qc">🍁 QC</span>':''}
          ${(e.tags||[]).includes('LGBT')?'<span class="tag lgbt">🏳️‍🌈 LGBT+</span>':''}
          ${country?`<span class="country-chip">${cf(country)} ${country}</span>`:''}
        </div>
        <div class="mtitle">${e.title}</div>
        <div class="msaison" style="color:${epColor}">${e.saison||''}</div>
        <div class="mmeta">
          <span class="tag" style="background:var(--accent);color:#fff;border:none">${e.platform||'—'}</span>
          <span class="tag">${e.type==='film'?'🎬 Film':'📺 Série'}</span>
          ${e.note?`<span class="tag note">★ ${e.note}</span>`:''}
          <span class="tag" style="background:var(--bg3);color:var(--text3)">📅 ${fd(e.date)}</span>
        </div>
        <div class="mlangs">
          ${(e.lang||[]).map(l=>`<span class="tag ${l==='FR'?'lang-fr':'lang-en'}">${l==='FR'?'🇫🇷 Français':'🇬🇧 Anglais'}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="genres-row">${(e.categories||[]).map(g=>`<span class="genre-chip">${g}</span>`).join('')}</div>
    <div class="slbl">Synopsis</div>
    <div class="mdesc">${e.desc||'Aucune description disponible.'}</div>
    ${(e.cast||[]).length?`<div class="slbl">Distribution</div><div class="cast-list">${e.cast.map(c=>`<span class="cast-chip">${c}</span>`).join('')}</div>`:''}
    ${trailers.length?`<div class="slbl">Bandes-annonces &amp; teasers</div>
      <div class="trailers">${trailers.map(t=>`
        <a class="tlink" href="${t.url}" target="_blank" rel="noreferrer">
          <span class="ytbadge">▶ YT</span>
          <span class="tlabel">${t.label}</span>
          <span class="tlang" style="background:${t.lang==='VF'?'rgba(79,142,247,.15)':'rgba(34,197,94,.1)'};color:${t.lang==='VF'?'var(--accent)':'var(--green)'}">${t.lang}</span>
        </a>`).join('')}
      </div>`:''}
    <hr class="modal-sep">
    ${!isOut?`<button class="rem-toggle${hasR?' on':''}" id="rem-btn" onclick="toggleReminder('${id}')">
      ${hasR?'🔔 Rappel activé — Cliquer pour retirer':'🔔 Activer un rappel'}
    </button>`:''}
    <a class="platlink" href="${e.platformUrl||'#'}" target="_blank" rel="noreferrer">
      Voir sur ${e.platform} →
    </a>`;

  document.getElementById('overlay').classList.add('open');
}

function closeModal(ev){
  if(ev&&ev.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  curModal=null;
}

function toggleReminder(id){
  reminders=reminders.includes(id)?reminders.filter(x=>x!==id):[...reminders,id];
  localStorage.setItem('cal_rem',JSON.stringify(reminders));
  if(curModal?.id===id)openModal(id);
  renderReminders();
}

function renderReminders(){
  const bar=document.getElementById('rem-bar');
  const list=document.getElementById('rem-list');
  const evs=ALL.filter(e=>reminders.includes(e.id));
  if(!evs.length){bar.style.display='none';return;}
  bar.style.display='block';
  list.innerHTML=evs.map(e=>`<div class="rem-item"><span>${e.title} <span style="color:var(--text3)">— ${e.saison}</span></span><span class="rem-date">${fd(e.date)}</span></div>`).join('');
}

function setView(v){
  state.view=v;
  document.getElementById('btn-list').classList.toggle('on',v==='list');
  document.getElementById('btn-cal').classList.toggle('on',v==='cal');
  render();setTimeout(scrollToToday,200);
}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mob-backdrop').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-backdrop').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('overlay').classList.remove('open');});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
loadData();
</script>
</body>
</html>
