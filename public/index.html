<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendrier">
<meta name="theme-color" content="#0d0f14">
<title>Calendrier Films & Séries</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230d0f14' rx='24'/><text y='130' x='96' text-anchor='middle' font-size='120'>🎬</text></svg>">
<style>
:root{
  --bg:#0d0f14;--bg2:#131620;--bg3:#1a1d28;--bg4:#1e2235;
  --border:#2a2f42;--border2:#3a3f55;
  --text:#e8edf5;--text2:#8892a4;--text3:#555f72;
  --blue:#3b82f6;--purple:#a855f7;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
a{color:inherit;text-decoration:none}
button,input{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* APP LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
@media(max-width:860px){.app{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:860px){.sidebar{display:none}.sidebar.open{display:flex;position:fixed;inset:0;z-index:200;height:100vh;width:85%;max-width:320px}}
.sidebar-hdr{padding:20px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5}
.sidebar-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sidebar-sub{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border)}
.stat{background:var(--bg3);border-radius:8px;padding:8px 10px}
.stat-v{font-size:20px;font-weight:700}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

/* FILTERS */
.f-section{padding:10px 16px;border-bottom:1px solid var(--border)}
.f-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;user-select:none}
.chip:hover{opacity:.85}
.search-wrap{padding:10px 16px;border-bottom:1px solid var(--border)}
.search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px 8px 32px;font-size:13px;outline:none}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--text3)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* UPDATE STATUS */
.update-section{padding:10px 16px;margin-top:auto;border-top:1px solid var(--border)}
.update-info{font-size:10px;color:var(--text3);line-height:1.6}
.update-date{color:var(--green);font-weight:600}
.update-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .15s}
.update-btn:hover{border-color:var(--blue);color:var(--blue)}

/* MAIN */
.main{min-width:0;padding:0}
.main-hdr{display:flex;align-items:center;gap:10px;padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.main-title{font-size:18px;font-weight:700;flex:1}
.main-sub{font-size:11px;color:var(--text3);margin-top:1px}
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0}
.vbtn{padding:6px 12px;font-size:11px;font-weight:600;background:transparent;color:var(--text2);border:none;cursor:pointer;transition:all .15s}
.vbtn.on{background:var(--bg4);color:var(--text)}
.menu-btn{display:none;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px}
@media(max-width:860px){.menu-btn{display:block}}
.content{padding:16px 20px}

/* REMINDERS */
.reminders-bar{background:var(--bg3);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:12px 16px;margin-bottom:18px}
.rem-title{font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.rem-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border)}
.rem-item:last-child{border-bottom:none}
.rem-date{color:var(--amber);font-size:11px}

/* WEEK / DAY */
.week-sep{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:14px;margin-top:6px}
.day-block{margin-bottom:16px}
.day-lbl{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
.dispo-dot{font-size:9px;background:rgba(34,197,94,.15);color:var(--green);padding:1px 6px;border-radius:10px;font-weight:700}

/* EVENT CARD */
.ecard{display:flex;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:7px;align-items:flex-start}
.ecard:hover{background:var(--bg3);border-color:var(--border2)}
.ecard.qc{border-left:3px solid var(--blue)}
.eposter{width:50px;height:74px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg3)}
.eplaceholder{width:50px;height:74px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1px solid}
.ebody{flex:1;min-width:0}
.etitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.esaison{font-size:11px;margin-bottom:5px}
.etags{display:flex;gap:4px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600}
.earrow{font-size:18px;color:var(--text3);flex-shrink:0;align-self:center}

/* CALENDAR */
.cal-month{margin-bottom:26px}
.cal-mtitle{font-size:15px;font-weight:700;margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.cal-hd{background:var(--bg3);padding:6px 3px;text-align:center;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.cal-cell{background:var(--bg2);padding:5px;min-height:78px}
.cal-cell.today{border-top:2px solid var(--blue)}
.cal-cell.empty{background:var(--bg)}
.cal-n{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:3px}
.cal-cell.today .cal-n{color:var(--blue)}
.cal-dot{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;border:1px solid;transition:opacity .15s}
.cal-dot:hover{opacity:.7}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--text3)}

/* ERROR */
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:16px 20px;margin:20px}
.empty-box{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#0f1118;border:1px solid var(--border2);border-radius:16px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-top{position:relative}
.mback{width:100%;height:190px;object-fit:cover;border-radius:16px 16px 0 0;display:block}
.mback-ph{width:100%;height:76px;border-radius:16px 16px 0 0}
.mclose{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mbadge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:10px}
.mbody{padding:14px 20px 22px}
.mposter-row{display:flex;gap:14px;align-items:flex-start}
.mposter{width:84px;border-radius:9px;object-fit:cover;box-shadow:0 4px 18px rgba(0,0,0,.6);border:2px solid var(--border2);flex-shrink:0}
.mposter.up{margin-top:-50px}
.minfo{flex:1;min-width:0}
.mtitle{font-size:20px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px}
.msaison{font-size:12px;font-weight:500;margin-bottom:8px}
.mmeta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.mlangs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.slbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mdesc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:16px}
.cast-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.cast-chip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:20px;font-size:10px}
.trailers{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.tlink{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);text-decoration:none;transition:border-color .15s}
.tlink:hover{border-color:#e50914}
.ytbadge{background:#e50914;color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;flex-shrink:0}
.tlang{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0}
.rem-toggle{width:100%;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:all .15s}
.platlink{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s}
.genres-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.genre-chip{background:var(--bg3);color:var(--text3);padding:1px 7px;border-radius:6px;font-size:10px}

/* MOBILE OVERLAY */
.mob-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
.mob-backdrop.open{display:block}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-hdr">
    <div class="sidebar-title">Films &amp; Séries</div>
    <div class="sidebar-sub">Québec &amp; International 2025–2026</div>
  </div>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-v" id="s-total" style="color:var(--blue)">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-v" id="s-avenir" style="color:var(--amber)">—</div><div class="stat-l">À venir</div></div>
    <div class="stat"><div class="stat-v" id="s-qc" style="color:var(--blue)">—</div><div class="stat-l">Québec</div></div>
    <div class="stat"><div class="stat-v" id="s-lgbt" style="color:var(--purple)">—</div><div class="stat-l">LGBT+</div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" id="search" placeholder="Titre, acteur, genre...">
  </div>
  <div class="f-section"><div class="f-label">Période</div><div class="chips" id="f-period"></div></div>
  <div class="f-section"><div class="f-label">Statut</div><div class="chips" id="f-status"></div></div>
  <div class="f-section"><div class="f-label">Type</div><div class="chips" id="f-type"></div></div>
  <div class="f-section"><div class="f-label">Langue</div><div class="chips" id="f-lang"></div></div>
  <div class="f-section"><div class="f-label">Étiquettes</div><div class="chips" id="f-tags"></div></div>
  <div class="f-section"><div class="f-label">Catégorie</div><div class="chips" id="f-cats"></div></div>
  <div class="f-section"><div class="f-label">Plateforme</div><div class="chips" id="f-plat"></div></div>
  <div class="update-section">
    <div class="update-info">
      Mis à jour le <span class="update-date" id="update-date">—</span><br>
      Mise à jour auto chaque lundi à 6h
    </div>
    <button class="update-btn" onclick="reloadData()">↻ Recharger les données</button>
  </div>
</aside>
<div class="mob-backdrop" id="mob-backdrop" onclick="closeSidebar()"></div>

<!-- MAIN -->
<main class="main">
  <div class="main-hdr">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div>
      <div class="main-title">Calendrier des sorties</div>
      <div class="main-sub" id="result-count">Chargement...</div>
    </div>
    <div class="view-toggle">
      <button class="vbtn on" id="btn-list" onclick="setView('list')">☰ Liste</button>
      <button class="vbtn" id="btn-cal" onclick="setView('cal')">📅 Cal.</button>
    </div>
  </div>
  <div class="content">
    <div id="reminders-bar" style="display:none" class="reminders-bar">
      <div class="rem-title">🔔 Rappels</div>
      <div id="reminders-list"></div>
    </div>
    <div id="content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement des données...</div></div></div>
  </div>
</main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div id="modal-top"></div>
    <div class="mbody" id="modal-body"></div>
  </div>
</div>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const FR_D=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FR_M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const TODAY=new Date().toISOString().slice(0,10);

const PLAT_C={
  'Netflix':'#e50914','Prime Video':'#00a8e0','Disney+':'#1a3eb5',
  'Apple TV+':'#999','Crave':'#a855f7','ICI TOU.TV':'#ef4444',
  'Télé-Québec':'#10b981','Club Illico':'#f97316','TVA+':'#e11d48',
  'Cinéma':'#64748b'
};
const pc=p=>PLAT_C[p]||'#666';
const ps=p=>({Netflix:'N','Prime Video':'P','Disney+':'D+','Apple TV+':'A',Crave:'C','ICI TOU.TV':'T','Télé-Québec':'TQ','Club Illico':'I','TVA+':'TVA',Cinéma:'🎬'})[p]||'?';

function fd(s){const d=new Date(s);return FR_D[d.getDay()]+' '+d.getDate()+' '+FR_M[d.getMonth()];}
function fmth(s){const[y,m]=s.split('-').map(Number);return FR_M[m-1]+' '+y;}

// ── ÉTAT ─────────────────────────────────────────────────────────────────────
let ALL=[];
let state={search:'',period:'all',status:'all',types:new Set(['serie','film']),tags:new Set(),cats:new Set(),plat:'all',lang:'all',view:'list'};
let reminders=JSON.parse(localStorage.getItem('cal_rem')||'[]');
let curModal=null;

// ── CHARGEMENT DONNÉES ───────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const json=await r.json();

    // Fusion data.json + data-qc.json
    let events=json.events||[];
    try{
      const rqc=await fetch('data-qc.json?t='+Date.now());
      if(rqc.ok){
        const qc=await rqc.json();
        // Déduplique par ID
        const ids=new Set(events.map(e=>e.id));
        qc.forEach(e=>{if(!ids.has(e.id)) events.push(e);});
      }
    }catch(e){}

    ALL=events.sort((a,b)=>a.date.localeCompare(b.date));

    // Date de mise à jour
    if(json.generated_at){
      const d=new Date(json.generated_at);
      document.getElementById('update-date').textContent=
        d.getDate()+' '+FR_M[d.getMonth()]+' '+d.getFullYear();
    }
    initFilters();
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error-box">
        <strong>Erreur de chargement</strong><br>
        Impossible de charger data.json.<br><br>
        Si vous ouvrez ce fichier en local (file://), certains navigateurs bloquent le chargement de fichiers JSON. Solutions :<br>
        • Utiliser Chrome avec <code>--allow-file-access-from-files</code><br>
        • Ou héberger sur GitHub Pages (recommandé)
      </div>`;
  }
}

async function reloadData(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Rechargement...</div></div>';
  await loadData();
}

// ── FILTRES ──────────────────────────────────────────────────────────────────
function filtered(){
  const q=state.search.toLowerCase();
  return ALL.filter(e=>{
    if(q&&![e.title,e.desc,...(e.cast||[]),...(e.categories||[])].join(' ').toLowerCase().includes(q))return false;
    if(state.plat!=='all'&&e.platform!==state.plat)return false;
    if(!state.types.has(e.type))return false;
    if(state.cats.size>0&&!(e.categories||[]).some(c=>state.cats.has(c)))return false;
    if(state.tags.size>0&&!(e.tags||[]).some(t=>state.tags.has(t)))return false;
    if(state.status!=='all'&&e.status!==state.status)return false;
    if(state.lang==='fr'&&!(e.lang||[]).includes('FR'))return false;
    if(state.lang==='en'&&!(e.lang||[]).includes('EN'))return false;
    if(state.period==='2025'&&!e.date.startsWith('2025'))return false;
    if(state.period==='2026'&&!e.date.startsWith('2026'))return false;
    return true;
  });
}

function initFilters(){
  const allCats=[...new Set(ALL.flatMap(e=>e.categories||[]))].sort();
  const allPlats=[...new Set(ALL.map(e=>e.platform))].sort();

  function makeChips(id,items,stateKey,isSet,colorFn){
    const el=document.getElementById(id);
    el.innerHTML='';
    items.forEach(([val,lbl,col])=>{
      const sp=document.createElement('span');
      sp.className='chip';
      sp.dataset.val=val;
      sp.textContent=lbl;
      const c=col||'#8892a4';
      sp.style.borderColor=c+'66';
      sp.style.color=c;
      const activate=()=>{sp.style.background=c+'33';};
      const deactivate=()=>{sp.style.background='transparent';};
      if(isSet){
        const active=(stateKey==='types'?state.types:stateKey==='tags'?state.tags:state.cats).has(val);
        if(active) activate();
        sp.onclick=()=>{
          const s=stateKey==='types'?state.types:stateKey==='tags'?state.tags:state.cats;
          if(s.has(val)){if(stateKey==='types'&&s.size===1)return;s.delete(val);deactivate();}
          else{s.add(val);activate();}
          render();
        };
      } else {
        const cur=state[stateKey];
        if(cur===val) activate();
        sp.onclick=()=>{
          el.querySelectorAll('.chip').forEach(c=>c.style.background='transparent');
          state[stateKey]=val;
          activate();
          render();
        };
      }
      el.appendChild(sp);
    });
  }

  makeChips('f-period',[['all','Tout','#8892a4'],['2025','2025','#60a5fa'],['2026','2026','#818cf8']],'period',false);
  makeChips('f-status',[['all','Tout','#8892a4'],['sorti','Disponible','#22c55e'],['a-venir','À venir','#f59e0b']],'status',false);
  makeChips('f-lang',[['all','Tout','#8892a4'],['fr','FR','#60a5fa'],['en','EN','#86efac']],'lang',false);
  makeChips('f-type',[['serie','Séries','#22c55e'],['film','Films','#f59e0b']],'types',true);
  makeChips('f-tags',[['QC','🍁 Québec','#3b82f6'],['CA','🇨🇦 Canada','#7dd3fc'],['LGBT','🏳️‍🌈 LGBT+','#a855f7'],['Prime','🏆 Primé','#f59e0b']],'tags',true);
  makeChips('f-cats',allCats.map(c=>[c,c,'#818cf8']),'cats',true);
  makeChips('f-plat',[['all','Toutes','#8892a4'],...allPlats.map(p=>[p,p,pc(p)])],'plat',false);

  // Activer les chips par défaut
  document.querySelectorAll('#f-period .chip[data-val="all"],#f-status .chip[data-val="all"],#f-lang .chip[data-val="all"],#f-plat .chip[data-val="all"]').forEach(c=>{
    c.style.background='rgba(136,146,164,0.2)';
  });
  document.querySelectorAll('#f-type .chip').forEach(c=>c.style.background=c.dataset.val==='serie'?'#22c55e33':'#f59e0b33');

  document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render(){
  const evs=filtered();
  const av=evs.filter(e=>e.status==='a-venir').length;
  document.getElementById('s-total').textContent=ALL.length;
  document.getElementById('s-avenir').textContent=ALL.filter(e=>e.status==='a-venir').length;
  document.getElementById('s-qc').textContent=ALL.filter(e=>(e.tags||[]).includes('QC')).length;
  document.getElementById('s-lgbt').textContent=ALL.filter(e=>(e.tags||[]).includes('LGBT')).length;
  document.getElementById('result-count').textContent=evs.length+' titre'+(evs.length!==1?'s':'')+' — '+av+' à venir';
  renderReminders();
  document.getElementById('content').innerHTML=state.view==='list'?renderList(evs):renderCal(evs);
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(evs){
  if(!evs.length) return '<div class="empty-box">Aucun résultat pour ces filtres.</div>';
  const groups={};
  evs.forEach(e=>{
    const d=new Date(e.date);const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
    const wk=sun.toISOString().slice(0,10);
    if(!groups[wk])groups[wk]={};
    if(!groups[wk][e.date])groups[wk][e.date]=[];
    groups[wk][e.date].push(e);
  });
  let html='';
  Object.keys(groups).sort().forEach(wk=>{
    const wd=new Date(wk);const ed=new Date(wk);ed.setDate(wd.getDate()+6);
    html+=`<div class="week-sep">${wd.getDate()} ${FR_M[wd.getMonth()]} au ${ed.getDate()} ${FR_M[ed.getMonth()]} ${ed.getFullYear()}</div>`;
    Object.keys(groups[wk]).sort().forEach(day=>{
      const d=new Date(day);const isPast=day<=TODAY;
      html+=`<div class="day-block"><div class="day-lbl">${FR_D[d.getDay()]} ${d.getDate()} ${FR_M[d.getMonth()]}${isPast?'<span class="dispo-dot">DISPO</span>':''}</div>`;
      groups[wk][day].forEach(e=>html+=cardHTML(e));
      html+='</div>';
    });
  });
  return html;
}

function cardHTML(e){
  const c=pc(e.platform);const isQC=(e.tags||[]).includes('QC');
  return `<div class="ecard${isQC?' qc':''}" onclick="openModal('${e.id}')">
    ${e.poster?`<img class="eposter" src="${e.poster}" alt="${e.title}" onerror="this.style.display='none'">`:
    `<div class="eplaceholder" style="background:${c}18;color:${c};border-color:${c}44">${ps(e.platform)}</div>`}
    <div class="ebody">
      <div class="etitle">${e.title}</div>
      <div class="esaison" style="color:${c}">${e.saison}</div>
      <div class="etags">
        <span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${e.platform}</span>
        ${(e.tags||[]).map(t=>tagBadge(t)).join('')}
        ${e.note?`<span class="tag" style="background:rgba(251,191,36,.15);color:#fbbf24">★${e.note}</span>`:''}
        ${e.status==='a-venir'?`<span class="tag" style="background:rgba(245,158,11,.12);color:var(--amber)">À VENIR</span>`:''}
        ${(e.lang||[]).map(l=>`<span class="tag" style="background:${l==='FR'?'rgba(59,130,246,.15)':'rgba(134,239,172,.1)'};color:${l==='FR'?'#60a5fa':'#86efac'}">${l}</span>`).join('')}
        ${(e.trailers||[]).length?`<span class="tag" style="background:rgba(239,68,68,.12);color:#f87171">▶${e.trailers.length}</span>`:''}
      </div>
    </div>
    <div class="earrow">›</div>
  </div>`;
}

function tagBadge(t){
  const m={QC:['#1d4ed8','#93c5fd','🍁 QC'],CA:['#1e3a5f','#7dd3fc','🇨🇦 CA'],LGBT:['#6d28d9','#c4b5fd','🏳️‍🌈 LGBT+'],Prime:['#78350f','#fcd34d','🏆']};
  if(!m[t])return'';const[bg,col,lbl]=m[t];
  return`<span class="tag" style="background:${bg};color:${col}">${lbl}</span>`;
}

// ── RENDER CALENDAR ───────────────────────────────────────────────────────────
function renderCal(evs){
  const months=[...new Set(evs.map(e=>e.date.slice(0,7)))].sort();
  if(!months.length)return'<div class="empty-box">Aucun résultat.</div>';
  return months.map(ms=>{
    const[y,m]=ms.split('-').map(Number);
    const first=new Date(y,m-1,1).getDay();
    const days=new Date(y,m,0).getDate();
    return`<div class="cal-month"><div class="cal-mtitle">${fmth(ms)}</div>
      <div class="cal-grid">
        ${FR_D.map(d=>`<div class="cal-hd">${d}</div>`).join('')}
        ${Array(first).fill('<div class="cal-cell empty"></div>').join('')}
        ${Array.from({length:days},(_,i)=>{
          const d=i+1;
          const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const de=evs.filter(e=>e.date===ds);
          return`<div class="cal-cell${ds===TODAY?' today':''}">
            <div class="cal-n">${d}</div>
            ${de.map(e=>{
              const c=pc(e.platform);
              return`<div class="cal-dot" style="background:${c}22;color:${c};border-color:${c}44" onclick="openModal('${e.id}')" title="${e.title}">${(e.tags||[]).includes('QC')?'🍁 ':''}${e.title}</div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div></div>`;
  }).join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id){
  const e=ALL.find(x=>x.id===id);if(!e)return;
  curModal=e;
  const c=pc(e.platform);const isOut=e.status==='sorti';
  const hasR=reminders.includes(id);
  document.getElementById('modal-top').innerHTML=`
    ${e.backdrop?`<img class="mback" src="${e.backdrop}" alt="" onerror="this.style.display='none'">`:
    `<div class="mback-ph" style="background:linear-gradient(135deg,${c}33,#0f1118)"></div>`}
    <button class="mclose" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    <div class="mbadge" style="background:${isOut?'#22c55e':'#f59e0b'};color:#000">${isOut?'DISPONIBLE':'À VENIR'}</div>`;

  const trailers=[...(e.trailers||[])].sort((a,b)=>a.lang==='VF'?-1:1);
  document.getElementById('modal-body').innerHTML=`
    <div class="mposter-row">
      ${e.poster?`<img class="mposter${e.backdrop?' up':''}" src="${e.poster}" alt="${e.title}" onerror="this.style.display='none'">` : ''}
      <div class="minfo">
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">
          ${(e.tags||[]).map(t=>tagBadge(t)).join('')}
        </div>
        <div class="mtitle">${e.title}</div>
        <div class="msaison" style="color:${c}">${e.saison}</div>
        <div class="mmeta">
          <span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${e.platform}</span>
          ${e.note?`<span class="tag" style="background:rgba(251,191,36,.15);color:#fbbf24">★${e.note}</span>`:''}
          <span class="tag" style="background:var(--bg3);color:var(--text3)">📅 ${fd(e.date)}</span>
        </div>
        <div class="mlangs">
          ${(e.lang||[]).map(l=>`<span class="tag" style="background:${l==='FR'?'rgba(59,130,246,.2)':'rgba(134,239,172,.15)'};color:${l==='FR'?'#60a5fa':'#86efac'}">${l==='FR'?'🇫🇷 Français':'🇬🇧 Anglais'}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="genres-row">${(e.categories||[]).map(g=>`<span class="genre-chip">${g}</span>`).join('')}</div>
    <div class="slbl">Synopsis</div>
    <div class="mdesc">${e.desc||'Aucune description disponible.'}</div>
    ${(e.cast||[]).length?`<div class="slbl">Distribution</div><div class="cast-list">${e.cast.map(c=>`<span class="cast-chip">${c}</span>`).join('')}</div>`:''}
    ${trailers.length?`<div class="slbl">Bandes-annonces &amp; teasers</div>
      <div class="trailers">${trailers.map(t=>`
        <a class="tlink" href="${t.url}" target="_blank" rel="noreferrer">
          <span class="ytbadge">▶ YT</span>
          <span style="flex:1;font-size:12px">${t.label}</span>
          <span class="tlang" style="background:${t.lang==='VF'?'rgba(59,130,246,.2)':'rgba(134,239,172,.1)'};color:${t.lang==='VF'?'#60a5fa':'#86efac'}">${t.lang}</span>
        </a>`).join('')}</div>`:''}
    ${!isOut?`<button class="rem-toggle" id="rem-btn"
      style="background:${hasR?'rgba(34,197,94,.15)':'transparent'};border:1px solid ${hasR?'rgba(34,197,94,.4)':'var(--border)'};color:${hasR?'#4ade80':'var(--text2)'}"
      onclick="toggleReminder('${id}')">
      ${hasR?'🔔 Rappel activé — Cliquer pour retirer':'🔔 Activer un rappel pour cette sortie'}
    </button>`:''}
    <a class="platlink" href="${e.platformUrl||'#'}" target="_blank" rel="noreferrer"
      style="background:${c}22;border:1px solid ${c}55;color:${c}">
      Voir sur ${e.platform} →
    </a>`;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(ev){
  if(ev&&ev.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  curModal=null;
}

function toggleReminder(id){
  reminders=reminders.includes(id)?reminders.filter(x=>x!==id):[...reminders,id];
  localStorage.setItem('cal_rem',JSON.stringify(reminders));
  if(curModal&&curModal.id===id){openModal(id);}
  renderReminders();
}

function renderReminders(){
  const bar=document.getElementById('reminders-bar');
  const list=document.getElementById('reminders-list');
  const evs=ALL.filter(e=>reminders.includes(e.id));
  if(!evs.length){bar.style.display='none';return;}
  bar.style.display='block';
  list.innerHTML=evs.map(e=>`<div class="rem-item"><span>${e.title} <span style="color:var(--text3)">— ${e.saison}</span></span><span class="rem-date">${fd(e.date)}</span></div>`).join('');
}

// ── VUE ──────────────────────────────────────────────────────────────────────
function setView(v){
  state.view=v;
  document.getElementById('btn-list').classList.toggle('on',v==='list');
  document.getElementById('btn-cal').classList.toggle('on',v==='cal');
  render();
}

// ── MOBILE SIDEBAR ───────────────────────────────────────────────────────────
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-backdrop').classList.add('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-backdrop').classList.remove('open');
}

// ── CLAVIER ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('overlay').classList.remove('open');
});

// ── PWA ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
